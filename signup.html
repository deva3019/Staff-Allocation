<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <title>Create Account | StaffSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: { 50: '#eef2ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }, darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100 font-sans antialiased min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="absolute top-0 left-0 w-full h-96 bg-primary-600 rounded-b-[100px] sm:rounded-b-[200px] z-0 shadow-2xl shadow-primary-500/20 dark:bg-primary-700"></div>

    <main class="flex-grow flex items-center justify-center p-4 z-10 relative mt-10 mb-10">
        <div class="w-full max-w-2xl bg-white dark:bg-darkCard rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 overflow-hidden fade-in flex flex-col md:flex-row">
            
            <div class="hidden md:flex md:w-2/5 bg-slate-50 dark:bg-slate-800/50 p-8 flex-col justify-between border-r border-slate-100 dark:border-slate-800">
                <div>
                    <div class="flex items-center gap-2 mb-8">
                        <svg class="w-8 h-8 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <span class="font-bold text-xl tracking-tight">StaffSync</span>
                    </div>
                    <h2 class="text-2xl font-bold mb-4">Join the platform</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">Set up your local environment to manage staff, allocate invigilators, and generate dynamic PDFs instantly.</p>
                </div>
                <div class="text-xs text-slate-400 mt-8">
                    <p>100% Local Processing</p>
                    <p>Zero Server Latency</p>
                </div>
            </div>

            <div class="w-full md:w-3/5 p-8 sm:p-10">
                <div class="text-center md:text-left mb-8">
                    <h1 class="text-2xl font-bold">Create Account</h1>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Already have an account? <a href="login.html" class="text-primary-600 hover:underline font-semibold">Log in</a></p>
                </div>

                <form id="signupForm" class="space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Full Name</label>
                            <input type="text" id="regName" required placeholder="John Doe" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 outline-none transition text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">System Role</label>
                            <select id="regRole" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 outline-none transition text-sm">
                                <option value="Admin">Administrator (Full Access)</option>
                                <option value="Staff">Staff (View Only)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email Address</label>
                        <div class="relative">
                            <input type="email" id="regEmail" required placeholder="you@school.edu" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg pl-10 pr-4 py-2.5 focus:ring-2 focus:ring-primary-500 outline-none transition text-sm">
                            <svg class="w-5 h-5 text-slate-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Date of Birth <span class="text-xs font-normal text-slate-400">(Used for password recovery)</span></label>
                        <input type="date" id="regDob" required class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 outline-none transition text-sm text-slate-600 dark:text-slate-300">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                            <input type="password" id="regPassword" required placeholder="••••••••" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 outline-none transition text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Confirm</label>
                            <input type="password" id="regConfirm" required placeholder="••••••••" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary-500 outline-none transition text-sm">
                        </div>
                    </div>

                    <button type="submit" id="signupBtn" class="w-full bg-primary-600 text-white rounded-lg px-4 py-3 font-semibold hover:bg-primary-700 transition shadow-lg shadow-primary-500/30 mt-4 flex justify-center items-center gap-2">
                        <span>Create Account</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 text-sm text-slate-500 dark:text-slate-400 z-10 relative">
        <p>Developed by <a href="https://deva-portfolio-app.netlify.app/" target="_blank" class="text-primary-600 hover:underline font-medium">Deva Veera Kumaran</a> | &copy; 2026</p>
    </footer>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

    <script src="js/auth.js"></script>
</body>
</html>
